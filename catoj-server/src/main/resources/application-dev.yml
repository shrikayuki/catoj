# 开发环境配置
spring:
  # 数据源配置（Druid + MySQL）
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.150.101:3306/algohub?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: algohub2024        # 改成 Docker 配置的密码

    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin123
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 2000

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: algohub2024      # 加上密码
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # RabbitMQ 配置
  rabbitmq:
    host: localhost
    port: 5672
    username: algohub            # Docker 配置的用户名
    password: algohub2024        # Docker 配置的密码
    virtual-host: /
    connection-timeout: 5000ms

# 开发环境日志级别
logging:
  level:
    com.cat.catoj: DEBUG
    org.springframework.web: INFO
    com.baomidou.mybatis plus: DEBUG

# Swagger/OpenAPI 配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha

# 自定义配置
catoj:
  jwt:
    secret: catoj-secret-key-for-dev-please-change-in-prod
    expiration: 86400000
    header: Authorization
    token-prefix: Bearer