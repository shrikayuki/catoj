# 开发环境配置
spring:
  # 数据源配置（Druid + MySQL）
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.150.101:3306/algohub?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: algohub2024        # 改成 Docker 配置的密码

    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin123
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 2000

  # Redis 配置
  data:
    redis:
      host: 192.168.150.101
      port: 6379
      password: algohub2024      # 加上密码
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # RabbitMQ 配置
  rabbitmq:
    host: 192.168.150.101
    port: 5672
    username: algohub            # Docker 配置的用户名
    password: algohub2024        # Docker 配置的密码
    virtual-host: /
    connection-timeout: 5000ms

  mail:
    host: smtp.qq.com  # 使用 QQ 邮箱
    port: 465
    username: 1322246106@qq.com
    password: lwkqswctrdfdhjjb  # QQ邮箱授权码（不是密码）
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory

# 开发环境日志级别
logging:
  level:
    com.cat.catoj: DEBUG
    org.springframework.web: INFO
    com.baomidou.mybatis plus: DEBUG

# Swagger/OpenAPI 配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha

# JWT 双 Token 配置
catoj:
  jwt:
    access:
      secret: catoj-access-secret-key-for-dev-please-change-in-prod
      expiration: 900  # 15分钟（秒）
      header: Authorization
      prefix: Bearer
    refresh:
      secret: catoj-refresh-secret-key-for-dev-please-change-in-prod
      expiration: 604800  # 7天（秒）